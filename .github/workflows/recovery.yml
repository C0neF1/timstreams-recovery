name: TimStreams Auto-Recovery

on:
  repository_dispatch:
    types: [recovery]
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'
    - cron: '0 22 * * *'

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run recovery
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
        run: node recover.js
      - name: Notify result
        if: always()
        run: echo "Recovery completed at $(date)"
